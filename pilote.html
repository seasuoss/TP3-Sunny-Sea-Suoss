<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilotes — Admin F1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/F1.svg/200px-F1.svg.png" alt="F1">
      <span>Admin F1</span>
    </div>
    <div class="nav-links">
      <a href="ecurie.html">Écuries</a>
      <a href="pilote.html" class="active">Pilotes</a>
      <a href="course.html">Courses</a>
      <a href="resultat.html">Résultats</a>
      <a href="utilisateur.html">Utilisateurs</a>
    </div>
  </nav>

  <header class="page-header">
    <h1>Pilotes</h1>
    <p class="subtitle">Afficher, ajouter, modifier et supprimer des enregistrements.</p>
  </header>

  <main class="main-layout">
    <section class="table-section">
      <div class="section-header">
        <h2>Enregistrements</h2>
        <span class="count-badge" id="count">–</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>ID</th><th>Prénom</th><th>Nom</th><th>Nationalité</th><th>N°</th><th>Écurie ID</th><th>Actions</th></tr></thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="loading">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside class="form-section">
      <div class="section-header">
        <h2 id="form-title">Ajouter</h2>
        <span class="mode-pill" id="mode-pill">AJOUT</span>
      </div>
      <form id="crud-form" onsubmit="return false">
        <input type="hidden" id="f-pk">
        <div class="fg"><label>Prénom <span class='req'>*</span></label><input type="text" id="f-prenom" placeholder="ex: Charles"></div>
        <div class="fg"><label>Nom <span class='req'>*</span></label><input type="text" id="f-nom" placeholder="ex: Leclerc"></div>
        <div class="fg"><label>Nationalité</label><input type="text" id="f-nationalite" placeholder="ex: Monégasque"></div>
        <div class="fg"><label>N° de course</label><input type="number" id="f-numero" placeholder="ex: 16"></div>
        <div class="fg"><label>ID Écurie</label><input type="number" id="f-ecurie_id" placeholder="ex: 1"></div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="btn-submit">Ajouter</button>
          <button type="button" class="btn-secondary" id="btn-cancel" style="display:none">Annuler</button>
        </div>
      </form>
    </aside>
  </main>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script src="js/pilote.js"></script>
</body>
</html>
