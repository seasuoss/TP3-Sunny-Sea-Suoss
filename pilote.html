<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 — Pilotes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<header class="navbar">
  <div class="logo"><a href="Acceuil.html"><img src="image/f1logo.png" alt="Logo F1"></a></div>
  <nav class="menu">
    <a href="Connexion.html">Connexion</a>
    <a href="Inscription.html">S&apos;inscrire</a>
    <div class="dropdown">
      <button class="dropdown-btn">Équipes F1</button>
      <div class="dropdown-content">
        <a href="Info of mercedes.html">Mercedes</a>
        <a href="Info of ferrari.html">Ferrari</a>
        <a href="Info of aston martin.html">Aston Martin</a>
        <a href="Info of redbull.html">RedBull</a>
        <a href="Info of mclaren.html">McLaren</a>
        <a href="Info of alpine.html">Alpine</a>
      </div>
    </div>
    <a href="index.html" class="btn-admin">⚙️ Admin</a>
  </nav>
</header>
<main class="admin-main">
  <h1>Pilotes F1</h1>
  <p id="pilote-message" class="msg"></p>
  <div class="table-toolbar">
    <input id="search-pilote" placeholder="🔍 Rechercher un pilote…" class="search-input">
    <button id="reload-pilotes" class="btn-reload">🔄 Actualiser</button>
  </div>
  <table class="data-table">
    <thead><tr><th>ID</th><th>Nom</th><th>Nationalité</th><th>Naissance</th><th>N° voiture</th><th>Écurie</th><th>Actions</th></tr></thead>
    <tbody id="pilote-body"><tr><td colspan="7">Chargement…</td></tr></tbody>
  </table>
  <section class="form-section">
    <h2>Ajouter un pilote</h2>
    <form id="pilote-form" class="admin-form">
      <input id="new-nom" placeholder="Nom complet" required>
      <input id="new-nat" placeholder="Nationalité">
      <input id="new-naiss" type="date">
      <input id="new-num" type="number" placeholder="N° voiture">
      <input id="new-ecurie" type="number" placeholder="ID Écurie">
      <button type="submit" class="btn-submit">➕ Ajouter</button>
    </form>
  </section>
  <div id="edit-modal" class="modal" style="display:none">
    <div class="modal-box">
      <h2>Modifier le pilote</h2>
      <form id="edit-form" class="admin-form">
        <input type="hidden" id="edit-id">
        <input id="edit-nom" placeholder="Nom complet" required>
        <input id="edit-nat" placeholder="Nationalité">
        <input id="edit-naiss" type="date">
        <input id="edit-num" type="number" placeholder="N° voiture">
        <input id="edit-ecurie" type="number" placeholder="ID Écurie">
        <div class="modal-actions">
          <button type="submit" class="btn-submit">💾 Sauvegarder</button>
          <button type="button" id="close-modal" class="btn-cancel">Annuler</button>
        </div>
      </form>
    </div>
  </div>
</main>
<footer>
  <div class="footer-left"><div class="socials">
    <a href="https://www.facebook.com/Formula1?locale=fr_FR" target="_blank" rel="noreferrer"><img src="image/logo reseau-sociaux/logofacebook.png" alt="Facebook"></a>
    <a href="https://www.instagram.com/f1" target="_blank" rel="noreferrer"><img src="image/logo reseau-sociaux/logoinstagram.png" alt="Instagram"></a>
    <a href="https://x.com/F1?lang=fr" target="_blank" rel="noreferrer"><img src="image/logo reseau-sociaux/logoX.png" alt="X"></a>
  </div></div>
  <div class="footer-center"><p>2003–2025 Formula One World Championship Limited</p></div>
  <div class="footer-right"><a class="contact" href="Contact.html">Contactez-nous</a></div>
</footer>
<script src="js/api.js" defer></script>
<script src="js/shared.js" defer></script>
<script src="js/pilote.js" defer></script>
</body>
</html>
