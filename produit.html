<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits — Admin TP3</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav style="background:#1a1a1a;padding:1rem 2rem;border-bottom:2px solid #e10600;display:flex;align-items:center;gap:2rem;">
    <a href="admin.html" style="color:#e10600;font-weight:700;text-decoration:none;">← Admin</a>
    <span style="color:#aaa;">Gestion des produits</span>
  </nav>

  <main class="admin-main">
    <h1 class="page-title">📦 Produits</h1>

    <!-- Formulaire ajout -->
    <div class="admin-section">
      <h2>Ajouter un produit</h2>
      <form id="produit-form" class="admin-form">
        <label>Nom<input id="nom" type="text" required placeholder="Nom du produit"></label>
        <label>Prix<input id="prix" type="number" step="0.01" required placeholder="0.00"></label>
        <label>Coût<input id="cout" type="number" step="0.01" required placeholder="0.00"></label>
        <label>Stock<input id="stock" type="number" placeholder="0"></label>
        <label>Catégorie<input id="categorie" type="number" placeholder="1"></label>
        <button type="submit" class="btn-submit">Ajouter</button>
      </form>
      <p id="produit-message" class="message"></p>
    </div>

    <!-- Tableau liste avec recherche -->
    <div class="admin-section">
      <div class="section-header">
        <h2>Liste des produits</h2>
        <div class="section-header-actions">
          <input id="search-produit" type="text" class="search-input" placeholder="&#128269; Rechercher par nom…">
          <button id="reload-produits" class="btn-reload">🔄 Actualiser</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Nom</th><th>Prix</th><th>Coût</th><th>Stock</th><th>Cat.</th><th>Actions</th></tr>
          </thead>
          <tbody id="produits-body">
            <tr><td colspan="7">Chargement&hellip;</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal modification -->
  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>✏️ Modifier le produit</h3>
      <form id="edit-form" class="admin-form" style="grid-template-columns:1fr 1fr;">
        <input type="hidden" id="edit-id">
        <label>Nom<input id="edit-nom" type="text" required></label>
        <label>Prix<input id="edit-prix" type="number" step="0.01" required></label>
        <label>Coût<input id="edit-cout" type="number" step="0.01" required></label>
        <label>Stock<input id="edit-stock" type="number"></label>
        <label>Catégorie<input id="edit-categorie" type="number"></label>
        <div class="form-actions" style="grid-column:1/-1;">
          <button type="submit" class="btn-save">Enregistrer</button>
          <button type="button" id="close-modal" class="btn-cancel">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/produits.js"></script>
</body>
</html>
