<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilisateurs — Admin F1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/F1.svg/200px-F1.svg.png" alt="F1">
      <span>Admin F1</span>
    </div>
    <div class="nav-links">
      <a href="ecurie.html">Écuries</a>
      <a href="pilote.html">Pilotes</a>
      <a href="course.html">Courses</a>
      <a href="resultat.html">Résultats</a>
      <a href="utilisateur.html" class="active">Utilisateurs</a>
    </div>
  </nav>

  <header class="page-header">
    <h1>Utilisateurs</h1>
    <p class="subtitle">Afficher, ajouter, modifier et supprimer des enregistrements.</p>
  </header>

  <main class="main-layout">
    <section class="table-section">
      <div class="section-header">
        <h2>Enregistrements</h2>
        <span class="count-badge" id="count">–</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>ID</th><th>Nom d'utilisateur</th><th>Courriel</th><th>Rôle</th><th>Actions</th></tr></thead>
          <tbody id="tbody">
            <tr><td colspan="5" class="loading">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside class="form-section">
      <div class="section-header">
        <h2 id="form-title">Ajouter</h2>
        <span class="mode-pill" id="mode-pill">AJOUT</span>
      </div>
      <form id="crud-form" onsubmit="return false">
        <input type="hidden" id="f-pk">
        <div class="fg"><label>Nom d'utilisateur <span class='req'>*</span></label><input type="text" id="f-username" placeholder="ex: fan_f1"></div>
        <div class="fg"><label>Courriel <span class='req'>*</span></label><input type="email" id="f-email" placeholder="ex: fan@f1.com"></div>
        <div class="fg"><label>Mot de passe</label><input type="password" id="f-mot_de_passe" placeholder="••••••••"></div>
        <div class="fg"><label>Rôle</label><select id="f-role"><option value="user">Utilisateur</option><option value="admin">Administrateur</option></select></div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="btn-submit">Ajouter</button>
          <button type="button" class="btn-secondary" id="btn-cancel" style="display:none">Annuler</button>
        </div>
      </form>
    </aside>
  </main>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script src="js/utilisateur.js"></script>
</body>
</html>
