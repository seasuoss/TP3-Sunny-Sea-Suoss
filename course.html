<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 — Courses</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<header class="navbar">
  <div class="logo"><a href="Acceuil.html"><img src="image/f1logo.png" alt="Logo F1"></a></div>
  <nav class="menu">
    <a href="Connexion.html">Connexion</a>
    <a href="Inscription.html">S&apos;inscrire</a>
    <div class="dropdown">
      <button class="dropdown-btn">Équipes F1</button>
      <div class="dropdown-content">
        <a href="Info of mercedes.html">Mercedes</a>
        <a href="Info of ferrari.html">Ferrari</a>
        <a href="Info of aston martin.html">Aston Martin</a>
        <a href="Info of redbull.html">RedBull</a>
        <a href="Info of mclaren.html">McLaren</a>
        <a href="Info of alpine.html">Alpine</a>
      </div>
    </div>
    <a href="index.html" class="btn-admin">⚙️ Admin</a>
  </nav>
</header>
<main class="admin-main">
  <h1>Courses F1</h1>
  <p id="course-message" class="msg"></p>
  <div class="table-toolbar">
    <button id="reload-courses" class="btn-reload">🔄 Actualiser</button>
  </div>
  <table class="data-table">
    <thead><tr><th>ID</th><th>Nom</th><th>Circuit</th><th>Date</th><th>Tours</th><th>Actions</th></tr></thead>
    <tbody id="course-body"><tr><td colspan="6">Chargement…</td></tr></tbody>
  </table>
  <section id="resultat-section" style="display:none" class="sub-section">
    <h2 id="resultat-title">Résultats</h2>
    <table class="data-table">
      <thead><tr><th>ID</th><th>Pilote</th><th>Position</th><th>Points</th><th>Temps total</th></tr></thead>
      <tbody id="resultat-body"></tbody>
    </table>
  </section>
  <section class="form-section">
    <h2>Ajouter une course</h2>
    <form id="course-form" class="admin-form">
      <input id="new-nom" placeholder="Nom de la course" required>
      <input id="new-circuit" placeholder="Circuit">
      <input id="new-date" type="date">
      <input id="new-tours" type="number" placeholder="Nombre de tours">
      <button type="submit" class="btn-submit">➕ Ajouter</button>
    </form>
  </section>
</main>
<footer>
  <div class="footer-left"><div class="socials">
    <a href="https://www.facebook.com/Formula1?locale=fr_FR" target="_blank" rel="noreferrer"><img src="image/logo reseau-sociaux/logofacebook.png" alt="Facebook"></a>
    <a href="https://www.instagram.com/f1" target="_blank" rel="noreferrer"><img src="image/logo reseau-sociaux/logoinstagram.png" alt="Instagram"></a>
    <a href="https://x.com/F1?lang=fr" target="_blank" rel="noreferrer"><img src="image/logo reseau-sociaux/logoX.png" alt="X"></a>
  </div></div>
  <div class="footer-center"><p>2003–2025 Formula One World Championship Limited</p></div>
  <div class="footer-right"><a class="contact" href="Contact.html">Contactez-nous</a></div>
</footer>
<script src="js/api.js" defer></script>
<script src="js/shared.js" defer></script>
<script src="js/course.js" defer></script>
</body>
</html>
