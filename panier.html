<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paniers — Admin TP3</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav style="background:#1a1a1a;padding:1rem 2rem;border-bottom:2px solid #e10600;display:flex;align-items:center;gap:2rem;">
    <a href="admin.html" style="color:#e10600;font-weight:700;text-decoration:none;">← Admin</a>
    <span style="color:#aaa;">Gestion des paniers</span>
  </nav>

  <main class="admin-main">
    <h1 class="page-title">🛒 Paniers</h1>

    <!-- Formulaire ajout -->
    <div class="admin-section">
      <h2>Créer un panier</h2>
      <form id="panier-form" class="admin-form">
        <label>ID Client<input id="idclient" type="number" required placeholder="1"></label>
        <label>ID Utilisateur<input id="idutilisateur" type="number" required placeholder="1"></label>
        <label>Note<input id="note" type="text" placeholder="Note optionnelle"></label>
        <button type="submit" class="btn-submit">Créer</button>
      </form>
      <p id="panier-message" class="message"></p>
    </div>

    <!-- Tableau paniers -->
    <div class="admin-section">
      <div class="section-header">
        <h2>Liste des paniers</h2>
        <div class="section-header-actions">
          <input id="filtre-panier-id" type="text" class="search-input" placeholder="Filtrer par ID…">
          <button id="reload-paniers" class="btn-reload">🔄 Actualiser</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#Panier</th><th>ID Client</th><th>ID Utilisateur</th><th>Date</th><th>Note</th><th>Actions</th></tr>
          </thead>
          <tbody id="paniers-body">
            <tr><td colspan="6">Chargement&hellip;</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Section items -->
    <div class="admin-section" id="items-section" style="display:none;">
      <h2 id="items-title">Items du panier</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#Item</th><th>ID Produit</th><th>Quantité</th><th>Prix</th><th>Escompte</th></tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/paniers.js"></script>
</body>
</html>
