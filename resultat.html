<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats — Admin F1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/F1.svg/200px-F1.svg.png" alt="F1">
      <span>Admin F1</span>
    </div>
    <div class="nav-links">
      <a href="ecurie.html">Écuries</a>
      <a href="pilote.html">Pilotes</a>
      <a href="course.html">Courses</a>
      <a href="resultat.html" class="active">Résultats</a>
      <a href="utilisateur.html">Utilisateurs</a>
    </div>
  </nav>

  <header class="page-header">
    <h1>Résultats</h1>
    <p class="subtitle">Afficher, ajouter, modifier et supprimer des enregistrements.</p>
  </header>

  <main class="main-layout">
    <section class="table-section">
      <div class="section-header">
        <h2>Enregistrements</h2>
        <span class="count-badge" id="count">–</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>ID</th><th>Course ID</th><th>Pilote ID</th><th>Position</th><th>Points</th><th>Statut</th><th>Actions</th></tr></thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="loading">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside class="form-section">
      <div class="section-header">
        <h2 id="form-title">Ajouter</h2>
        <span class="mode-pill" id="mode-pill">AJOUT</span>
      </div>
      <form id="crud-form" onsubmit="return false">
        <input type="hidden" id="f-pk">
        <div class="fg"><label>ID Course <span class='req'>*</span></label><input type="number" id="f-course_id" placeholder="ex: 1"></div>
        <div class="fg"><label>ID Pilote <span class='req'>*</span></label><input type="number" id="f-pilote_id" placeholder="ex: 3"></div>
        <div class="fg"><label>Position finale <span class='req'>*</span></label><input type="number" id="f-position" placeholder="ex: 1"></div>
        <div class="fg"><label>Points</label><input type="number" id="f-points" placeholder="ex: 25"></div>
        <div class="fg"><label>Statut</label><select id="f-statut"><option value="Finisher">Finisher</option><option value="DNF">DNF — Did Not Finish</option><option value="DNS">DNS — Did Not Start</option><option value="DSQ">DSQ — Disqualifié</option></select></div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="btn-submit">Ajouter</button>
          <button type="button" class="btn-secondary" id="btn-cancel" style="display:none">Annuler</button>
        </div>
      </form>
    </aside>
  </main>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script src="js/resultat.js"></script>
</body>
</html>
